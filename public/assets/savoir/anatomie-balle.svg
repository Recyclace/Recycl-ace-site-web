<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="Poppins,Arial,sans-serif">
  <defs>
    <radialGradient id="felt" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#C9E86A"/><stop offset="100%" stop-color="#A8D05D"/>
    </radialGradient>
    <radialGradient id="rub" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2E3D2B"/><stop offset="100%" stop-color="#13302A"/>
    </radialGradient>
  </defs>
  <rect width="640" height="420" fill="#FBF8F0"/>
  <!-- Balle -->
  <g transform="translate(210,210)">
    <circle r="150" fill="url(#felt)" stroke="#0F6B5B" stroke-width="2"/>
    <!-- Cutaway : quartier retiré révélant les couches -->
    <path d="M0 0 L150 0 A150 150 0 0 0 106 -106 Z" fill="#FBF8F0"/>
    <!-- Couche caoutchouc (anneau intérieur) -->
    <path d="M0 0 L120 0 A120 120 0 0 0 85 -85 Z" fill="url(#rub)"/>
    <!-- creux intérieur -->
    <path d="M0 0 L60 0 A60 60 0 0 0 42 -42 Z" fill="#FBF8F0"/>
    <!-- épaisseur feutrine (bande extérieure du quartier) -->
    <path d="M120 0 L150 0 A150 150 0 0 0 106 -106 L85 -85 A120 120 0 0 1 120 0 Z" fill="#8FBF3E"/>
    <!-- couture -->
    <path d="M-150 0 Q-60 -70 0 -150" fill="none" stroke="#FBF8F0" stroke-width="5"/>
    <path d="M-150 0 Q-60 70 0 150" fill="none" stroke="#FBF8F0" stroke-width="5"/>
  </g>
  <!-- Flèche + label Feutrine -->
  <g stroke="#13302A" stroke-width="2" fill="none">
    <path d="M300 96 L440 70" marker-end="url(#a)"/>
  </g>
  <text x="452" y="66" font-size="22" font-weight="800" fill="#0F6B5B">Feutrine</text>
  <text x="452" y="90" font-size="14" fill="#13302A" opacity="0.7">surface en fibre</text>
  <!-- Flèche + label Caoutchouc -->
  <g stroke="#13302A" stroke-width="2" fill="none">
    <path d="M270 150 L440 175" marker-end="url(#a)"/>
  </g>
  <text x="452" y="182" font-size="22" font-weight="800" fill="#0F6B5B">Caoutchouc</text>
  <text x="452" y="206" font-size="14" fill="#13302A" opacity="0.7">cœur recyclable</text>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#13302A"/></marker>
  </defs>
</svg>
